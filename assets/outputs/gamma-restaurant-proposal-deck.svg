    <text x="28" y="96" fill="#f7f6f1" font-family="Arial" font-size="18">Social content for local restaurants</text>
    <rect x="28" y="128" width="124" height="18" rx="9" fill="#d5a84f"/>
  </g>
  <g transform="translate(470 172)">
